services:
  app:
    build: .
    image: intranet-platform:latest
    container_name: intranet-platform
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_PATH=/app/persist/app.db
      - UPLOAD_DIR=/app/persist/uploads
    volumes:
      - ./persist:/app/persist
